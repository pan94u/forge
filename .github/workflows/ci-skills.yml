name: CI - Skill Validation

on:
  pull_request:
    paths:
      - 'plugins/**/skills/**'
      - 'plugins/**/.claude-plugin/**'
      - 'skill-tests/**'
  push:
    branches: [main]
    paths:
      - 'plugins/**/skills/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-skills:
    name: Validate Skill Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build skill-tests module
        run: ./gradlew :skill-tests:build --no-daemon

      - name: Run skill validation
        id: validate
        run: |
          ./gradlew :skill-tests:run --args="plugins" --no-daemon 2>&1 | tee validation-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('validation-output.txt', 'utf8');
            const body = `## Skill Validation Results\n\n\`\`\`\n${output}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on validation errors
        if: steps.validate.outputs.exit_code != '0'
        run: exit 1

  check-frontmatter:
    name: Check SKILL.md Frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find changed SKILL.md files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*/SKILL.md' | tr '\n' ' ')
          else
            CHANGED=$(git diff --name-only HEAD~1 -- '*/SKILL.md' | tr '\n' ' ')
          fi
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Validate YAML frontmatter
        if: steps.changed.outputs.files != ''
        run: |
          pip install pyyaml
          python3 << 'PYEOF'
          import yaml
          import sys
          import re

          files = "${{ steps.changed.outputs.files }}".split()
          errors = []

          for f in files:
              if not f.strip():
                  continue
              with open(f, 'r') as fh:
                  content = fh.read()
              if not content.startswith('---'):
                  errors.append(f"{f}: Missing YAML frontmatter")
                  continue
              end = content.index('---', 3)
              fm_text = content[3:end]
              try:
                  fm = yaml.safe_load(fm_text)
                  for field in ['name', 'version', 'profile']:
                      if field not in fm:
                          errors.append(f"{f}: Missing required field '{field}'")
                  if 'version' in fm and not re.match(r'^\d+\.\d+\.\d+', str(fm['version'])):
                      errors.append(f"{f}: Invalid version format '{fm['version']}'")
              except yaml.YAMLError as e:
                  errors.append(f"{f}: Invalid YAML: {e}")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          else:
              print(f"All {len(files)} SKILL.md files passed frontmatter validation")
          PYEOF

name: CI - Web IDE

on:
  pull_request:
    paths:
      - 'web-ide/**'
      - 'adapters/**'
      - 'agent-eval/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
  push:
    branches: [main]
    paths:
      - 'web-ide/**'
      - 'adapters/**'
      - 'agent-eval/**'

permissions:
  contents: read

jobs:
  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ide/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-ide/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: web-ide/frontend/coverage/
          retention-days: 14

  frontend-build:
    name: Frontend Build
    needs: frontend-lint-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ide/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-ide/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web-ide/frontend/.next/
          retention-days: 7

  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and test all backend modules
        run: |
          ./gradlew :web-ide:backend:build --no-daemon
          ./gradlew :web-ide:backend:test --no-daemon
          ./gradlew :adapters:model-adapter:test --no-daemon
          ./gradlew :agent-eval:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            web-ide/backend/build/reports/tests/
            adapters/model-adapter/build/reports/tests/
            agent-eval/build/reports/tests/
          retention-days: 14

  baseline-checks:
    name: Baseline Quality Gates
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make baseline scripts executable
        run: chmod +x plugins/forge-superagent/baselines/*.sh

      - name: Run security baseline
        run: plugins/forge-superagent/baselines/security-baseline.sh
        continue-on-error: false

      - name: Run architecture baseline
        run: plugins/forge-superagent/baselines/architecture-baseline.sh
        continue-on-error: false

      - name: Run code-style baseline
        run: plugins/forge-superagent/baselines/code-style-baseline.sh
        continue-on-error: true

      - name: Run test-coverage baseline
        run: plugins/forge-superagent/baselines/test-coverage-baseline.sh
        continue-on-error: true

  e2e-tests:
    name: E2E Tests
    needs: [frontend-build, backend-test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Playwright
        working-directory: web-ide/frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          ./gradlew :web-ide:backend:bootRun --no-daemon &
          sleep 15

      - name: Run E2E tests
        working-directory: web-ide/frontend
        run: npx playwright test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-ide/frontend/playwright-report/
          retention-days: 14

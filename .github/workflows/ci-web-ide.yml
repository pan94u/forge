name: CI - Web IDE

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'web-ide/**'
      - 'adapters/**'
      - 'agent-eval/**'
      - 'forge-eval/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
  push:
    branches: [main]
    paths:
      - 'web-ide/**'
      - 'adapters/**'
      - 'agent-eval/**'
      - 'forge-eval/**'

permissions:
  contents: read
  packages: write

jobs:
  # 前端目前无单元测试，E2E 测试需要完整环境，暂跳过
  # frontend-lint-test:
  #   name: Frontend Lint & Test
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: web-ide/frontend
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
  #     - name: Set up Node.js 20
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: 'npm'
  #         cache-dependency-path: web-ide/frontend/package-lock.json
  #     - name: Install dependencies
  #       run: npm ci
  #     - name: Run ESLint
  #       run: npm run lint
  #     - name: Run TypeScript type check
  #       run: npx tsc --noEmit

  # 前端构建（用于后续 E2E 测试或手动验证）
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ide/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-ide/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web-ide/frontend/.next/
          retention-days: 7

  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and test all backend modules
        run: |
          ./gradlew :web-ide:backend:build --no-daemon
          ./gradlew :web-ide:backend:test --no-daemon
          ./gradlew :adapters:model-adapter:test --no-daemon
          ./gradlew :agent-eval:test --no-daemon
          ./gradlew :forge-eval:eval-engine:test --no-daemon
          ./gradlew :forge-eval:eval-api:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            web-ide/backend/build/reports/tests/
            adapters/model-adapter/build/reports/tests/
            agent-eval/build/reports/tests/
          retention-days: 14

  baseline-checks:
    name: Baseline Quality Gates
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make baseline scripts executable
        run: chmod +x plugins/forge-superagent/baselines/*.sh

      - name: Run security baseline
        run: plugins/forge-superagent/baselines/security-baseline.sh
        continue-on-error: false

      - name: Run architecture baseline
        run: plugins/forge-superagent/baselines/architecture-baseline.sh
        continue-on-error: false

      - name: Run code-style baseline
        run: plugins/forge-superagent/baselines/code-style-baseline.sh
        continue-on-error: true

      - name: Run test-coverage baseline
        run: plugins/forge-superagent/baselines/test-coverage-baseline.sh
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Docker 镜像推送（仅 main 分支）
  # ---------------------------------------------------------------------------
  docker-push-backend:
    name: Push Backend Image
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: ./gradlew :web-ide:backend:bootJar -x test --no-daemon
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: web-ide/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push-frontend:
    name: Push Frontend Image
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ide/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-ide/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: web-ide/frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
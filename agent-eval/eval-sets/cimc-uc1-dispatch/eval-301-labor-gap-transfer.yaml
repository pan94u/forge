id: eval-301-labor-gap-transfer
name: 人效分析 — 缺员借调
description: >
  评测智能体识别缺员工作中心并制定跨工序借调方案的能力。应能
  自动发现各工作中心的人员盈缺，匹配技能矩阵，推荐最优借调
  组合，并评估借调后的效率影响和合规风险。
tags:
  - cimc
  - uc1
  - labor-efficiency
  - staffing-gap
  - worker-transfer
  - skill-matching
baseline_pass_rate: 0.80

prompt: |
  今天外侧板线缺 3 个焊工，喷漆线缺 1 个喷漆工，
  但底板线和门板线好像人多了。帮我看看怎么借调？
  注意技能要匹配，别把不会焊接的人调去焊接岗。

context:
  skill: labor-efficiency
  scenario: "跨工序人员借调"
  deficit_centers: "PANEL_OUT_SIDE 缺焊工3人, PAINTING 缺喷漆工1人"
  surplus_hint: "FLOOR_LINE, DOOR_PANEL 可能有富余"
  constraint: "技能匹配是硬约束：焊工→焊工，喷漆工→喷漆工"
  labor_efficiency_target: "≤4.5人/台"

assertions:
  - type: tool_used
    expected: "ope_query_labor_surplus"
    description: "查询各工作中心的人员盈缺状态"

  - type: tool_used
    expected: "ope_query_skills"
    description: "查询工人技能矩阵进行匹配"

  - type: tool_used
    expected: "ope_detect_gaps"
    description: "调用动态缺口检测"

  - type: matches_pattern
    expected: "富余|多余|可借|盈余|surplus"
    description: "识别有人员富余的工作中心"

  - type: matches_pattern
    expected: "焊工|焊接|技能.*匹配|skill|持证"
    description: "借调建议考虑技能匹配"

  - type: matches_pattern
    expected: "借调|调配|从.*到|转移.*人"
    description: "给出具体的借调方案（从哪到哪）"

  - type: not_contains
    expected: "普工调到焊接岗"
    description: "不应建议无焊接资质的人去焊接"

  - type: tool_used
    expected: "ope_query_attendance"
    description: "查询今日考勤确认实际在岗人数"

quality_criteria:
  gap_identification: 0.95
  skill_matching_accuracy: 0.95
  transfer_feasibility: 0.90
  safety_compliance: 0.90
  efficiency_impact_assessment: 0.80

# =============================================================================
# Forge Web IDE Backend — Spring Boot Configuration
# =============================================================================

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

# =============================================================================
# Spring Configuration
# =============================================================================
spring:
  application:
    name: forge-web-ide-backend

  # ---------------------------------------------------------------------------
  # Jackson JSON serialization
  # ---------------------------------------------------------------------------
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    date-format: com.fasterxml.jackson.databind.util.ISO8601DateFormat

  # ---------------------------------------------------------------------------
  # Security — OAuth2 Resource Server
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8180/realms/forge}
          audiences: forge-web-ide
      client:
        registration:
          forge:
            client-id: ${OAUTH2_CLIENT_ID:forge-web-ide}
            client-secret: ${OAUTH2_CLIENT_SECRET:}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          forge:
            issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8180/realms/forge}

  # ---------------------------------------------------------------------------
  # DataSource — H2 for local dev, PostgreSQL for production
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/forge;AUTO_SERVER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      pool-name: forge-web-ide-pool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      leak-detection-threshold: 60000

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  # ---------------------------------------------------------------------------
  # Flyway Database Migration
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ---------------------------------------------------------------------------
  # WebSocket Configuration
  # ---------------------------------------------------------------------------
  websocket:
    max-text-message-size: 65536
    max-binary-message-size: 65536

  # ---------------------------------------------------------------------------
  # Lifecycle — graceful shutdown
  # ---------------------------------------------------------------------------
  lifecycle:
    timeout-per-shutdown-phase: 30s

# =============================================================================
# Forge Application Configuration
# =============================================================================
forge:
  # ---------------------------------------------------------------------------
  # Plugins — Skill and Profile loading
  # ---------------------------------------------------------------------------
  plugins:
    base-path: ${FORGE_PLUGINS_PATH:plugins}

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  security:
    enabled: ${FORGE_SECURITY_ENABLED:false}

  # ---------------------------------------------------------------------------
  # Encryption — 用户 API Key 加密存储
  # 密钥为 32 字节 Base64 编码字符串
  # 生成方式: openssl rand -base64 32
  # ---------------------------------------------------------------------------
  encryption:
    key: ${FORGE_ENCRYPTION_KEY:}

  # ---------------------------------------------------------------------------
  # CORS
  # ---------------------------------------------------------------------------
  cors:
    allowed-origins: ${FORGE_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:9000}

  # ---------------------------------------------------------------------------
  # Model Providers — 多模型提供商配置
  # 每个提供商可独立启用/禁用，API Key 通过环境变量注入
  # models 列表为空时使用 Adapter 内置默认清单
  # ---------------------------------------------------------------------------
  models:
    default-provider: ${MODEL_PROVIDER:anthropic}

    anthropic:
      enabled: true
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: ${ANTHROPIC_API_URL:https://api.anthropic.com}
      models:
        - id: claude-opus-4-6
          display-name: Claude Opus 4.6
          context-window: 200000
          max-output-tokens: 128000
          supports-vision: true
          cost-tier: HIGH
        - id: claude-sonnet-4-6
          display-name: Claude Sonnet 4.6
          context-window: 200000
          max-output-tokens: 64000
          supports-vision: true
          cost-tier: MEDIUM
        - id: claude-haiku-4-5-20251001
          display-name: Claude Haiku 4.5
          context-window: 200000
          max-output-tokens: 64000
          supports-vision: true
          cost-tier: LOW

    bedrock:
      enabled: true
      region: ${AWS_REGION:}
      profile: ${AWS_PROFILE:}
      models:
        - id: anthropic.claude-opus-4-6-v1
          display-name: Claude Opus 4.6 (Bedrock)
          context-window: 200000
          max-output-tokens: 128000
          supports-vision: true
          cost-tier: HIGH
        - id: anthropic.claude-sonnet-4-6
          display-name: Claude Sonnet 4.6 (Bedrock)
          context-window: 200000
          max-output-tokens: 64000
          supports-vision: true
          cost-tier: MEDIUM
        - id: anthropic.claude-haiku-4-5-20251001-v1:0
          display-name: Claude Haiku 4.5 (Bedrock)
          context-window: 200000
          max-output-tokens: 64000
          supports-vision: true
          cost-tier: LOW

    gemini:
      enabled: true
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
      models:
        - id: gemini-2.5-pro
          display-name: Gemini 2.5 Pro
          context-window: 1000000
          max-output-tokens: 65536
          supports-vision: true
          cost-tier: HIGH
        - id: gemini-2.5-flash
          display-name: Gemini 2.5 Flash
          context-window: 1000000
          max-output-tokens: 65536
          supports-vision: true
          cost-tier: MEDIUM
        - id: gemini-2.5-flash-lite
          display-name: Gemini 2.5 Flash Lite
          context-window: 1000000
          max-output-tokens: 65536
          supports-vision: false
          cost-tier: LOW

    dashscope:
      enabled: true
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: ${DASHSCOPE_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      models:
        - id: qwen3.5-plus
          display-name: Qwen 3.5 Plus
          context-window: 1000000
          max-output-tokens: 16384
          supports-vision: false
          cost-tier: HIGH
        - id: qwen-plus
          display-name: Qwen Plus
          context-window: 131072
          max-output-tokens: 16384
          supports-vision: false
          cost-tier: MEDIUM
        - id: qwen-turbo
          display-name: Qwen Turbo
          context-window: 1000000
          max-output-tokens: 8192
          supports-vision: false
          cost-tier: LOW
        - id: qwen-long
          display-name: Qwen Long
          context-window: 10000000
          max-output-tokens: 6000
          supports-vision: false
          cost-tier: LOW

    minimax:
      enabled: true
      api-key: ${MINIMAX_API_KEY:}
      base-url: ${MINIMAX_API_URL:https://api.minimaxi.com/anthropic}
      models:
        - id: MiniMax-M2.5
          display-name: MiniMax M2.5
          context-window: 1000000
          max-output-tokens: 16384
          cost-tier: MEDIUM
        - id: MiniMax-M2.5-lightning
          display-name: MiniMax M2.5 Lightning
          context-window: 1000000
          max-output-tokens: 16384
          cost-tier: LOW
        - id: MiniMax-M2.5-highspeed
          display-name: MiniMax M2.5 Highspeed
          context-window: 1000000
          max-output-tokens: 16384
          cost-tier: LOW

    openai:
      enabled: true
      api-key: ${LOCAL_MODEL_API_KEY:}
      base-url: ${LOCAL_MODEL_URL:}
      default-model: ${LOCAL_MODEL_NAME:}

  # ---------------------------------------------------------------------------
  # MCP Server URLs
  # ---------------------------------------------------------------------------
  mcp:
    knowledge:
      url: ${KNOWLEDGE_MCP_URL:http://localhost:8081}
      timeout-seconds: 30
    database:
      url: ${DATABASE_MCP_URL:http://localhost:8082}
      timeout-seconds: 30
    service-graph:
      url: ${SERVICE_GRAPH_MCP_URL:http://localhost:8083}
      timeout-seconds: 30
    artifact:
      url: ${ARTIFACT_MCP_URL:http://localhost:8084}
      timeout-seconds: 30
    observability:
      url: ${OBSERVABILITY_MCP_URL:http://localhost:8085}
      timeout-seconds: 30

  # ---------------------------------------------------------------------------
  # Claude Code Session Management
  # ---------------------------------------------------------------------------
  session:
    timeout-minutes: ${SESSION_TIMEOUT_MINUTES:30}
    max-concurrent-sessions: ${WEBSOCKET_MAX_SESSIONS:50}
    claude-code-path: ${CLAUDE_CODE_PATH:claude}
    working-directory: ${FORGE_WORKSPACE:/workspace}
    cleanup-interval-seconds: 60

  # ---------------------------------------------------------------------------
  # WebSocket Settings
  # ---------------------------------------------------------------------------
  websocket:
    endpoint: /ws
    allowed-origins: ${FORGE_WEBSOCKET_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:9000}
    heartbeat-interval-seconds: 25
    max-sessions-per-user: 5
    message-buffer-size: 8192

# =============================================================================
# Logging Configuration — Structured JSON
# =============================================================================
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.forge: ${LOG_LEVEL:INFO}
    com.forge.webide: DEBUG
    org.springframework.security: WARN
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    org.flywaydb: INFO
    io.netty: WARN
  pattern:
    console: >-
      %d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}
      %highlight(%-5level)
      [%thread]
      %cyan(%logger{36})
      - %msg%n
  file:
    name: ${LOG_FILE:logs/forge-web-ide-backend.log}
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB

# =============================================================================
# Actuator — Health, Metrics, and Management Endpoints
# =============================================================================
management:
  server:
    port: ${MANAGEMENT_PORT:8080}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,flyway
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,diskSpace
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    diskSpace:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    tags:
      application: forge-web-ide-backend
      environment: ${SPRING_PROFILES_ACTIVE:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,5s
    export:
      prometheus:
        enabled: true

  # ---------------------------------------------------------------------------
  # OpenTelemetry Tracing
  # ---------------------------------------------------------------------------
  tracing:
    enabled: true
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

# =============================================================================
# Profile Overrides
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: local
  security:
    oauth2:
      resourceserver:
        jwt:
          # In local mode, use a local Keycloak or disable JWT validation
          issuer-uri: http://localhost:9090/realms/forge
  h2:
    console:
      enabled: false

logging:
  level:
    com.forge: DEBUG
    org.springframework.web: DEBUG

---
spring:
  config:
    activate:
      on-profile: production

logging:
  level:
    root: WARN
    com.forge: INFO
    org.springframework.security: WARN
  pattern:
    # JSON structured logging for production log aggregation
    console: >-
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}",
      "level":"%level",
      "thread":"%thread",
      "logger":"%logger{36}",
      "message":"%msg",
      "service":"forge-web-ide-backend"}%n

management:
  endpoint:
    health:
      show-details: never
      show-components: never

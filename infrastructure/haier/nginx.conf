# =============================================================================
# Forge Nginx — 双端口路由
# 9000 → Forge App (Web IDE + Enterprise Console + Backend API)
# 9100 → Keycloak SSO
# =============================================================================

# ---------------------------------------------------------------------------
# Keycloak SSO (forge-sso.haier.net)
#   - 9100: 对外暴露（主机 9100 → 外层 nginx 80 → 用户浏览器）
#   - 80:   容器内网（backend/console 通过 Docker 别名访问，无端口 = 80）
# ---------------------------------------------------------------------------
server {
    listen 9100;
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 10m;

    # Keycloak /auth/*
    location /auth/ {
        proxy_pass http://keycloak:8180/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_read_timeout 300s;
    }

    location = / {
        return 301 $scheme://$host/auth/;
    }

    location / {
        return 404;
    }
}

# ---------------------------------------------------------------------------
# :9000 — Forge Platform (forge.haier.net)
# ---------------------------------------------------------------------------
server {
    listen 9000;
    server_name _;

    server_tokens off;
    absolute_redirect off;
    client_max_body_size 100m;

    # --- Keycloak SSO callback (前端 OIDC 回调页) ---
    location = /auth/callback {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- NextAuth routes (/api/auth/*) ---
    location /api/auth/ {
        # Backend auth endpoints (不走 NextAuth)
        location /api/auth/me {
            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/auth/sso-config {
            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Auth.js 生成的 redirect_uri 无 /console 前缀，rewrite 到 Console
        rewrite ^/api/auth/(.*)$ /console/api/auth/$1 break;
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # --- REST API ---
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- WebSocket ---
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Actuator ---
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Enterprise Console ---
    location = /console {
        return 302 $scheme://$http_host/console/zh;
    }
    location /console/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # --- Frontend (catch-all) ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# Forge Platform — 海尔内部部署
# =============================================================================
#
# 架构与 trial 一致，区别仅在域名和端口:
#   trial: sso.forge.local:8180 + forge.local:19000（端口内外一致，SSO_URL 统一）
#   haier: forge-sso.haier.net + forge.haier.net（外层 nginx 80 → 主机 9000/9100）
#
# 因为有外层 nginx，浏览器 URL 无端口，容器内用 Docker 服务名+端口:
#   浏览器: http://forge-sso.haier.net/auth （SSO_URL）
#   容器内: http://keycloak:9100/auth       （SSO_INTERNAL_URL, Docker 服务名）
#
# 前置条件:
#   1. 启动 SSO: cd ../sso && docker compose up -d
#   2. DNS: forge.haier.net / forge-sso.haier.net → 本机 IP（外层 nginx 转发）

# 加入 SSO 共享网络（SSO 独立部署，与 trial 一致）
networks:
  sso-net:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    cpus: 1
    mem_limit: 1g
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forge123}
    volumes:
      - ${DATA_ROOT:-/data/forge}/forge-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  knowledge-mcp:
    build:
      context: ../../mcp-servers/forge-knowledge-mcp
      dockerfile: Dockerfile
    container_name: forge-knowledge-mcp
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    environment:
      PORT: "8081"
      KNOWLEDGE_MODE: "local"
      KNOWLEDGE_BASE_PATH: "/knowledge-base"
    volumes:
      - ../../knowledge-base:/knowledge-base:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  database-mcp:
    build:
      context: ../../mcp-servers/forge-database-mcp
      dockerfile: Dockerfile
    container_name: forge-database-mcp
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    environment:
      PORT: "8082"
      FORGE_DB_FORGE_URL: jdbc:postgresql://postgres:5432/forge
      FORGE_DB_FORGE_USER: forge
      FORGE_DB_FORGE_PASSWORD: ${DB_PASSWORD:-forge123}
      FORGE_DB_DEFAULT_ACCESS_LEVEL: "FULL_READ"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    container_name: forge-backend
    restart: unless-stopped
    cpus: 2
    mem_limit: 3g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - sso-net
    environment:
      # --- Model Provider ---
      MODEL_PROVIDER: ${MODEL_PROVIDER:-minimax}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_URL: ${ANTHROPIC_API_URL:-https://api.anthropic.com}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_API_URL: ${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      LOCAL_MODEL_URL: ${LOCAL_MODEL_URL:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
      LOCAL_MODEL_API_KEY: ${LOCAL_MODEL_API_KEY:-}
      # --- Security ---
      FORGE_ENCRYPTION_KEY: ${FORGE_ENCRYPTION_KEY:-}
      FORGE_SECURITY_ENABLED: "true"
      FORGE_CORS_ALLOWED_ORIGINS: "${APP_URL:-http://forge.haier.net}"
      FORGE_FRONTEND_URL: "${APP_URL:-http://forge.haier.net}"
      # --- SSO ---
      # issuer 匹配 token（浏览器 URL，无端口）
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "${SSO_URL:-http://forge-sso.haier.net/auth}/realms/forge"
      # JWK 走容器内网（Docker 服务名 keycloak:8180，通过 sso-net 可达）
      FORGE_SECURITY_JWK_SET_URI: "${SSO_INTERNAL_URL:-http://keycloak:8180/auth}/realms/forge/protocol/openid-connect/certs"
      # --- Database ---
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FORGE_PLUGINS_PATH: /plugins
      FORGE_MCP_SERVERS: "http://knowledge-mcp:8081,http://database-mcp:8082"
      DB_URL: jdbc:postgresql://postgres:5432/forge
      DB_USERNAME: forge
      DB_PASSWORD: ${DB_PASSWORD:-forge123}
      DB_DRIVER: org.postgresql.Driver
      H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    volumes:
      - ../../plugins:/plugins:ro
      - ../../knowledge-base:/knowledge-base
      - ${DATA_ROOT:-/data/forge}/backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      # Workspace 端口映射
      - "19110-19115:3000-3005"
      - "19210-19215:8000-8005"
    depends_on:
      postgres:
        condition: service_healthy
      knowledge-mcp:
        condition: service_healthy
      database-mcp:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    container_name: forge-frontend
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  enterprise-console:
    build:
      context: ../../enterprise-console
      dockerfile: Dockerfile
    container_name: forge-enterprise-console
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - sso-net
    environment:
      PORT: "9001"
      NEXT_PUBLIC_BASE_PATH: "/console"
      BACKEND_URL: http://backend:8080
      KEYCLOAK_CLIENT_ID: forge-enterprise
      KEYCLOAK_CLIENT_SECRET: ${KC_ENTERPRISE_SECRET:-enterprise-secret}
      # KEYCLOAK_ISSUER: 浏览器 URL（RFC 9207 issuer 校验，匹配 token）
      KEYCLOAK_ISSUER: "${SSO_URL:-http://forge-sso.haier.net/auth}/realms/forge"
      # KEYCLOAK_INTERNAL_URL: 容器内网（token/userinfo/JWKS 端点，keycloak 默认 8180）
      KEYCLOAK_INTERNAL_URL: "${SSO_INTERNAL_URL:-http://keycloak:8180/auth}/realms/forge"
      NEXTAUTH_URL: "${APP_URL:-http://forge.haier.net}"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-forge-enterprise-nextauth-secret-32c}
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  nginx:
    image: nginx:alpine
    container_name: forge-nginx
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    networks:
      - default
      - sso-net
    ports:
      - "9000:9000"
      - "9100:9100"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - enterprise-console
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

# =============================================================================
# Forge Platform — 海尔内部部署（单机 8C16GB）
# =============================================================================
#
# 域名（外层 nginx 80 → 本机端口）:
#   forge.haier.net      → 外层 nginx → 主机:9000 → App
#   forge-sso.haier.net  → 外层 nginx → 主机:9100 → Keycloak SSO
#
# 前置条件:
#   1. DNS 解析: forge.haier.net / forge-sso.haier.net → 本机 IP
#   2. 复制 .env.example → .env 并填入实际值
#   3. 本地构建产物（见 deploy.sh）
#
# 使用方式:
#   ./deploy.sh          # 一键构建 + 启动
#   docker compose up -d # 仅启动（已有构建产物）

networks:
  forge-net:
    name: forge-net

services:
  # ===========================================================================
  # SSO 层
  # ===========================================================================

  sso-postgres:
    image: postgres:16-alpine
    container_name: forge-sso-postgres
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    networks: [forge-net]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c max_connections=40
    volumes:
      - ${DATA_ROOT:-/data/forge}/sso-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start --import-realm
    container_name: forge-sso-keycloak
    restart: unless-stopped
    cpus: 1
    mem_limit: 1g
    networks: [forge-net]
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: "8180"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: "/auth"
      # --- Hostname ---
      # Keycloak 签发的 issuer/URL 必须与浏览器+容器内访问一致
      # 容器内通过 nginx 别名 forge-sso.haier.net 访问（nginx listen 80）
      KC_HOSTNAME_URL: "http://forge-sso.haier.net/auth"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HEALTH_ENABLED: "true"
      KC_PROXY: "edge"
      # --- Database ---
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://sso-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - ./realm-export-haier.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      sso-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8180 && echo -e 'GET /auth/health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ===========================================================================
  # Forge 数据层
  # ===========================================================================

  forge-postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    cpus: 1
    mem_limit: 1g
    networks: [forge-net]
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forge123}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=8MB
      -c max_connections=100
    volumes:
      - ${DATA_ROOT:-/data/forge}/forge-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ===========================================================================
  # MCP Servers
  # ===========================================================================

  knowledge-mcp:
    build:
      context: ../../mcp-servers/forge-knowledge-mcp
      dockerfile: Dockerfile
    container_name: forge-knowledge-mcp
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    networks: [forge-net]
    environment:
      PORT: "8081"
      KNOWLEDGE_MODE: "local"
      KNOWLEDGE_BASE_PATH: "/knowledge-base"
    volumes:
      - ../../knowledge-base:/knowledge-base:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  database-mcp:
    build:
      context: ../../mcp-servers/forge-database-mcp
      dockerfile: Dockerfile
    container_name: forge-database-mcp
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    networks: [forge-net]
    environment:
      PORT: "8082"
      FORGE_DB_FORGE_URL: jdbc:postgresql://forge-postgres:5432/forge
      FORGE_DB_FORGE_USER: forge
      FORGE_DB_FORGE_PASSWORD: ${DB_PASSWORD:-forge123}
      FORGE_DB_DEFAULT_ACCESS_LEVEL: "FULL_READ"
    depends_on:
      forge-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ===========================================================================
  # Forge 应用层
  # ===========================================================================

  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    container_name: forge-backend
    restart: unless-stopped
    cpus: 2
    mem_limit: 3g
    networks: [forge-net]
    environment:
      # --- Model Provider ---
      MODEL_PROVIDER: ${MODEL_PROVIDER:-minimax}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_URL: ${ANTHROPIC_API_URL:-https://api.anthropic.com}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_API_URL: ${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      LOCAL_MODEL_URL: ${LOCAL_MODEL_URL:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
      LOCAL_MODEL_API_KEY: ${LOCAL_MODEL_API_KEY:-}
      # --- Security ---
      FORGE_ENCRYPTION_KEY: ${FORGE_ENCRYPTION_KEY:-}
      FORGE_SECURITY_ENABLED: "true"
      FORGE_CORS_ALLOWED_ORIGINS: "http://forge.haier.net"
      FORGE_FRONTEND_URL: "http://forge.haier.net"
      # --- SSO ---
      # 浏览器: http://forge-sso.haier.net/auth（外层 nginx 80→9100）
      # 容器内: http://forge-sso.haier.net/auth（Docker 别名→nginx:80→keycloak:8180）
      # issuer 统一为无端口 URL
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://forge-sso.haier.net/auth/realms/forge"
      # JWK Set 走容器内网（nginx 别名 + listen 80）
      FORGE_SECURITY_JWK_SET_URI: "http://forge-sso.haier.net/auth/realms/forge/protocol/openid-connect/certs"
      # --- Database ---
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FORGE_PLUGINS_PATH: /plugins
      FORGE_MCP_SERVERS: "http://knowledge-mcp:8081,http://database-mcp:8082"
      DB_URL: jdbc:postgresql://forge-postgres:5432/forge
      DB_USERNAME: forge
      DB_PASSWORD: ${DB_PASSWORD:-forge123}
      DB_DRIVER: org.postgresql.Driver
      H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    volumes:
      - ../../plugins:/plugins:ro
      - ../../knowledge-base:/knowledge-base
      - ${DATA_ROOT:-/data/forge}/backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      # Workspace 端口映射（避开 19100 node_exporter）
      - "19110-19115:3000-3005"
      - "19210-19215:8000-8005"
    depends_on:
      forge-postgres:
        condition: service_healthy
      knowledge-mcp:
        condition: service_healthy
      database-mcp:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    container_name: forge-frontend
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    networks: [forge-net]
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  enterprise-console:
    build:
      context: ../../enterprise-console
      dockerfile: Dockerfile
    container_name: forge-enterprise-console
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    networks: [forge-net]
    environment:
      PORT: "9001"
      NEXT_PUBLIC_BASE_PATH: "/console"
      BACKEND_URL: http://backend:8080
      KEYCLOAK_CLIENT_ID: forge-enterprise
      KEYCLOAK_CLIENT_SECRET: ${KC_ENTERPRISE_SECRET:-enterprise-secret}
      KEYCLOAK_ISSUER: "http://forge-sso.haier.net/auth/realms/forge"
      NEXTAUTH_URL: "http://forge.haier.net"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-forge-enterprise-nextauth-secret-32c}
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ===========================================================================
  # 网关 — 双端口统一入口
  # ===========================================================================

  nginx:
    image: nginx:alpine
    container_name: forge-nginx
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    networks:
      forge-net:
        aliases:
          # 关键：容器内通过此别名解析到 nginx
          # backend 访问 http://forge-sso.haier.net/auth → nginx:80 → keycloak:8180
          # 保证 JWT issuer 与浏览器侧一致
          - forge-sso.haier.net
    ports:
      - "9000:9000"
      - "9100:9100"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - enterprise-console
      - keycloak
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

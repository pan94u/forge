apiVersion: v1
kind: Namespace
metadata:
  name: forge-platform
  labels:
    app.kubernetes.io/name: forge-platform
    app.kubernetes.io/part-of: forge
    app.kubernetes.io/managed-by: kubectl
    environment: production
    team: platform
  annotations:
    description: "Forge Platform — AI-assisted software delivery platform"
    contact: "platform-team@example.com"
    slack-channel: "#forge-platform"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: forge-platform-quota
  namespace: forge-platform
  labels:
    app.kubernetes.io/name: forge-platform
    app.kubernetes.io/part-of: forge
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: forge-platform-limits
  namespace: forge-platform
  labels:
    app.kubernetes.io/name: forge-platform
    app.kubernetes.io/part-of: forge
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
    - type: Pod
      max:
        cpu: "4"
        memory: 4Gi

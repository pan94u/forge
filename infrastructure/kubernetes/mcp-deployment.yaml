# Forge Platform — MCP Server Deployments
# Each MCP server gets a Deployment and a ClusterIP Service.

---
# =============================================================================
# ConfigMap — Shared configuration for all MCP servers
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-shared-config
  namespace: forge-platform
  labels:
    app.kubernetes.io/part-of: forge
    app.kubernetes.io/component: mcp
data:
  SPRING_PROFILES_ACTIVE: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4317"
  OTEL_SERVICE_NAMESPACE: "forge-platform"

---
# =============================================================================
# forge-knowledge-mcp — Skill Profile registry and CLAUDE.md management
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-knowledge-mcp
  namespace: forge-platform
  labels:
    app.kubernetes.io/name: forge-knowledge-mcp
    app.kubernetes.io/part-of: forge
    app.kubernetes.io/component: mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-knowledge-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-knowledge-mcp
        app.kubernetes.io/part-of: forge
        app.kubernetes.io/component: mcp
    spec:
      serviceAccountName: forge-mcp
      containers:
        - name: knowledge-mcp
          image: forge-platform/knowledge-mcp:latest
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: forge-database-credentials
                  key: url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: forge-database-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-database-credentials
                  key: password
          envFrom:
            - configMapRef:
                name: mcp-shared-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: forge-knowledge-mcp
  namespace: forge-platform
  labels:
    app.kubernetes.io/name: forge-knowledge-mcp
    app.kubernetes.io/part-of: forge
    app.kubernetes.io/component: mcp
spec:
  type: ClusterIP
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-knowledge-mcp
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http


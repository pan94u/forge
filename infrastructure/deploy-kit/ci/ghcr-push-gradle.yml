# GitHub Actions: Gradle 项目构建 + GHCR 推送
#
# 使用方法：
#   1. 复制到 .github/workflows/
#   2. 修改 on.push.paths 匹配你的源码目录
#   3. 修改 Build JAR 步骤中的 Gradle task
#   4. 修改 docker/build-push-action 的 context 指向 Dockerfile 所在目录
#
# 前置条件：
#   - Dockerfile 接受预构建的 JAR（不在 Docker 内编译）
#   - GITHUB_TOKEN 自动拥有 packages:write 权限（无需额外配置）

name: CI - Build & Push

on:
  pull_request:
    paths: ['src/**', 'build.gradle.kts']
  push:
    branches: [main]
    paths: ['src/**', 'build.gradle.kts']

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: ./gradlew build test --no-daemon

  docker-push:
    name: Push to GHCR
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ---- 修改这里：换成你的 Gradle task ----
      - run: ./gradlew bootJar -x test --no-daemon

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- 修改这里：context 指向 Dockerfile 所在目录 ----
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Forge Platform — 生产部署（单机全包）
# PG + MCP + Backend + Frontend + Nginx 全部跑在一台机器上
#
# 用法:
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d

volumes:
  postgres-data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: forge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Knowledge MCP
  # ---------------------------------------------------------------------------
  knowledge-mcp:
    build:
      context: ../../mcp-servers/forge-knowledge-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8081"
      KNOWLEDGE_MODE: "local"
      KNOWLEDGE_BASE_PATH: "/knowledge-base"
    volumes:
      - ../../knowledge-base:/knowledge-base:ro
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Database MCP
  # ---------------------------------------------------------------------------
  database-mcp:
    build:
      context: ../../mcp-servers/forge-database-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8082"
      FORGE_DB_FORGE_URL: jdbc:postgresql://postgres:5432/forge
      FORGE_DB_FORGE_USER: forge
      FORGE_DB_FORGE_PASSWORD: ${DB_PASSWORD}
      FORGE_DB_DEFAULT_ACCESS_LEVEL: "FULL_READ"
    expose:
      - "8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      LOCAL_MODEL_URL: ${LOCAL_MODEL_URL:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
      LOCAL_MODEL_API_KEY: ${LOCAL_MODEL_API_KEY:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/forge
      SPRING_DATASOURCE_USERNAME: forge
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FORGE_ENCRYPTION_KEY: ${FORGE_ENCRYPTION_KEY:-}
      FORGE_SECURITY_ENABLED: ${FORGE_SECURITY_ENABLED:-false}
      FORGE_CORS_ALLOWED_ORIGINS: ${FORGE_EXTERNAL_URL:-http://localhost:9000}
      FORGE_FRONTEND_URL: ${FORGE_EXTERNAL_URL:-http://localhost:9000}
      FORGE_PLUGINS_PATH: /plugins
      FORGE_MCP_SERVERS: "http://knowledge-mcp:8081,http://database-mcp:8082"
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://keycloak:8080/realms/forge}
      OAUTH2_CLIENT_ID: ${OAUTH2_CLIENT_ID:-forge-web-ide}
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    volumes:
      - ../../plugins:/plugins:ro
      - ../../knowledge-base:/knowledge-base:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/knowledge/search"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      knowledge-mcp:
        condition: service_healthy
      database-mcp:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
      NEXT_PUBLIC_KEYCLOAK_URL: ${KEYCLOAK_EXTERNAL_URL:-http://localhost:8180}
      NEXT_PUBLIC_KEYCLOAK_REALM: forge
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: forge-web-ide
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Nginx
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: forge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

# =============================================================================
# Forge Platform — Trial 本地开发部署
# =============================================================================
#
# 前置条件:
#   1. 启动 SSO: cd ../sso && docker compose up -d
#   2. /etc/hosts 已添加: 127.0.0.1 sso.forge.local
#
# 使用方式:
#   docker compose -f docker-compose.trial.yml up --build -d
#   访问 http://localhost:19000

# 加入 SSO 共享网络（本地开发时 SSO 在同一台机器）
networks:
  sso-net:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge123
    volumes:
      - forge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  knowledge-mcp:
    build:
      context: ../../mcp-servers/forge-knowledge-mcp
      dockerfile: Dockerfile
    environment:
      PORT: "8081"
      KNOWLEDGE_MODE: "local"
      KNOWLEDGE_BASE_PATH: "/knowledge-base"
      WIKI_BASE_URL: "http://localhost:8090"
      WIKI_API_TOKEN: ""
    volumes:
      - ../../knowledge-base:/knowledge-base
    ports:
      - "19081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  database-mcp:
    build:
      context: ../../mcp-servers/forge-database-mcp
      dockerfile: Dockerfile
    environment:
      PORT: "8082"
      FORGE_DB_FORGE_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/forge}
      FORGE_DB_FORGE_USER: ${DB_USERNAME:-forge}
      FORGE_DB_FORGE_PASSWORD: ${DB_PASSWORD:-forge123}
      FORGE_DB_DEFAULT_ACCESS_LEVEL: "FULL_READ"
    ports:
      - "19082:8082"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - sso-net
    environment:
      # --- Model Provider Selection ---
      MODEL_PROVIDER: ${MODEL_PROVIDER:-minimax}
      # --- Provider API Keys ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_URL: ${ANTHROPIC_API_URL:-https://api.anthropic.com}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_API_URL: ${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # --- AWS Bedrock ---
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      # --- Local / OpenAI-compatible ---
      LOCAL_MODEL_URL: ${LOCAL_MODEL_URL:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
      LOCAL_MODEL_API_KEY: ${LOCAL_MODEL_API_KEY:-}
      # --- Security & Platform ---
      FORGE_ENCRYPTION_KEY: ${FORGE_ENCRYPTION_KEY:-}
      FORGE_SECURITY_ENABLED: ${FORGE_SECURITY_ENABLED:-true}
      FORGE_CORS_ALLOWED_ORIGINS: "http://forge.local:19000,http://localhost:19000,http://localhost:19001"
      FORGE_FRONTEND_URL: "http://forge.local:19000"
      # --- SSO (统一 URL，浏览器 + 容器可达) ---
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "${SSO_URL:-http://sso.forge.local:8180/auth}/realms/forge"
      FORGE_SECURITY_JWK_SET_URI: "${SSO_URL:-http://sso.forge.local:8180/auth}/realms/forge/protocol/openid-connect/certs"
      # --- Database ---
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FORGE_PLUGINS_PATH: /plugins
      FORGE_MCP_SERVERS: "http://knowledge-mcp:8081,http://database-mcp:8082"
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/forge}
      DB_USERNAME: ${DB_USERNAME:-forge}
      DB_PASSWORD: ${DB_PASSWORD:-forge123}
      DB_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
      H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    volumes:
      - ../../plugins:/plugins:ro
      - ../../knowledge-base:/knowledge-base
      - forge-backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "19100-19105:3000-3005"
      - "19200-19205:8000-8005"
      - "19888:8888"
    depends_on:
      postgres:
        condition: service_healthy
      knowledge-mcp:
        condition: service_healthy
      database-mcp:
        condition: service_healthy

  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
      # SSO URL 已移除 — 前端运行时从 /api/auth/sso-config 获取 SSO 配置
    depends_on:
      backend:
        condition: service_healthy

  enterprise-console:
    build:
      context: ../../enterprise-console
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - sso-net
    ports:
      - "19001:9001"
    environment:
      PORT: "9001"
      NEXT_PUBLIC_BASE_PATH: "/console"
      BACKEND_URL: http://backend:8080
      KEYCLOAK_CLIENT_ID: forge-enterprise
      KEYCLOAK_CLIENT_SECRET: enterprise-secret
      # SSO 统一 URL — 浏览器和容器都用同一个地址
      KEYCLOAK_ISSUER: "${SSO_URL:-http://sso.forge.local:8180/auth}/realms/forge"
      NEXTAUTH_URL: "http://forge.local:19000"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-forge-enterprise-nextauth-secret-32c}
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "19000:9000"
    volumes:
      - ./nginx-trial.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - enterprise-console

volumes:
  forge-backend-data:
    driver: local
  forge-postgres-data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge123
    volumes:
      - forge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  knowledge-mcp:
    build:
      context: ../../mcp-servers/forge-knowledge-mcp
      dockerfile: Dockerfile
    environment:
      PORT: "8081"
      KNOWLEDGE_MODE: "local"
      KNOWLEDGE_BASE_PATH: "/knowledge-base"
      WIKI_BASE_URL: "http://localhost:8090"
      WIKI_API_TOKEN: ""
    volumes:
      - ../../knowledge-base:/knowledge-base
    ports:
      - "19081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  database-mcp:
    build:
      context: ../../mcp-servers/forge-database-mcp
      dockerfile: Dockerfile
    environment:
      PORT: "8082"
      FORGE_DB_FORGE_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/forge}
      FORGE_DB_FORGE_USER: ${DB_USERNAME:-forge}
      FORGE_DB_FORGE_PASSWORD: ${DB_PASSWORD:-forge123}
      FORGE_DB_DEFAULT_ACCESS_LEVEL: "FULL_READ"
    ports:
      - "19082:8082"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
      - 114.114.114.114
    environment:
      # --- Model Provider Selection ---
      MODEL_PROVIDER: ${MODEL_PROVIDER:-minimax}
      # --- Provider API Keys ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_URL: ${ANTHROPIC_API_URL:-https://api.anthropic.com}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_API_URL: ${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # --- AWS Bedrock ---
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      # --- Local / OpenAI-compatible ---
      LOCAL_MODEL_URL: ${LOCAL_MODEL_URL:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
      LOCAL_MODEL_API_KEY: ${LOCAL_MODEL_API_KEY:-}
      # --- Security & Platform ---
      FORGE_ENCRYPTION_KEY: ${FORGE_ENCRYPTION_KEY:-}
      FORGE_SECURITY_ENABLED: ${FORGE_SECURITY_ENABLED:-false}
      FORGE_CORS_ALLOWED_ORIGINS: "http://localhost:19000,http://localhost:19001"
      FORGE_FRONTEND_URL: "http://localhost:19000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FORGE_PLUGINS_PATH: /plugins
      FORGE_MCP_SERVERS: "http://knowledge-mcp:8081,http://database-mcp:8082"
      # --- DataSource (PostgreSQL) ---
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/forge}
      DB_USERNAME: ${DB_USERNAME:-forge}
      DB_PASSWORD: ${DB_PASSWORD:-forge123}
      DB_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
      H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    volumes:
      - ../../plugins:/plugins:ro
      - ../../knowledge-base:/knowledge-base
      - forge-backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/knowledge/search"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "19100-19105:3000-3005"
      - "19200-19205:8000-8005"
      - "19888:8888"
    depends_on:
      postgres:
        condition: service_healthy
      knowledge-mcp:
        condition: service_healthy
      database-mcp:
        condition: service_healthy

  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
    depends_on:
      backend:
        condition: service_healthy

  enterprise-console:
    build:
      context: ../../enterprise-console
      dockerfile: Dockerfile
    ports:
      - "19001:3000"
    environment:
      BACKEND_URL: http://backend:8080
      KEYCLOAK_CLIENT_ID: forge-enterprise
      KEYCLOAK_CLIENT_SECRET: enterprise-secret
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8180/realms/forge}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://host.docker.internal:8180/realms/forge}
      NEXTAUTH_URL: http://localhost:19001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-forge-enterprise-nextauth-secret-32c}
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "19000:9000"
    volumes:
      - ./nginx-trial.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  forge-backend-data:
    driver: local
  forge-postgres-data:
    driver: local

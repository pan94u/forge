services:
  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FORGE_SECURITY_ENABLED: "false"
      FORGE_CORS_ALLOWED_ORIGINS: "http://localhost:9000"
      FORGE_FRONTEND_URL: "http://localhost:9000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/knowledge/search"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "9000:9000"
    volumes:
      - ./nginx-trial.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

services:
  knowledge-mcp:
    build:
      context: ../../mcp-servers/forge-knowledge-mcp
      dockerfile: Dockerfile
    environment:
      PORT: "8081"
      KNOWLEDGE_MODE: "local"
      KNOWLEDGE_BASE_PATH: "/knowledge-base"
      WIKI_BASE_URL: "http://localhost:8090"
      WIKI_API_TOKEN: ""
    volumes:
      - ../../knowledge-base:/knowledge-base
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  database-mcp:
    build:
      context: ../../mcp-servers/forge-database-mcp
      dockerfile: Dockerfile
    environment:
      PORT: "8082"
      FORGE_DB_FORGE_URL: ${DB_URL:-jdbc:h2:mem:forge;DB_CLOSE_DELAY=-1}
      FORGE_DB_FORGE_USER: ${DB_USERNAME:-sa}
      FORGE_DB_FORGE_PASSWORD: ${DB_PASSWORD:-}
      FORGE_DB_DEFAULT_ACCESS_LEVEL: "FULL_READ"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
      - 114.114.114.114
    environment:
      # --- Provider API Keys ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_URL: ${ANTHROPIC_API_URL:-https://api.anthropic.com}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_API_URL: ${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # --- AWS Bedrock ---
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      # --- Local / OpenAI-compatible ---
      LOCAL_MODEL_URL: ${LOCAL_MODEL_URL:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
      LOCAL_MODEL_API_KEY: ${LOCAL_MODEL_API_KEY:-}
      # --- Security & Platform ---
      FORGE_ENCRYPTION_KEY: ${FORGE_ENCRYPTION_KEY:-}
      FORGE_SECURITY_ENABLED: ${FORGE_SECURITY_ENABLED:-false}
      FORGE_CORS_ALLOWED_ORIGINS: "http://localhost:9000"
      FORGE_FRONTEND_URL: "http://localhost:9000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FORGE_PLUGINS_PATH: /plugins
      # --- DataSource (default: H2 file, override via .env for PostgreSQL) ---
      DB_URL: ${DB_URL:-jdbc:h2:file:./data/forge;AUTO_SERVER=TRUE}
      DB_USERNAME: ${DB_USERNAME:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_DRIVER: ${DB_DRIVER:-org.h2.Driver}
      FORGE_MCP_SERVERS: "http://knowledge-mcp:8081,http://database-mcp:8082"
    volumes:
      - ../../plugins:/plugins:ro
      - ../../knowledge-base:/knowledge-base
      - forge-backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/knowledge/search"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      knowledge-mcp:
        condition: service_healthy
      database-mcp:
        condition: service_healthy

  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "9000:9000"
    volumes:
      - ./nginx-trial.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  forge-backend-data:
    driver: local

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — Cache and session storage
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # forge-user-service — User authentication service
  # ---------------------------------------------------------------------------
  forge-user-service:
    build:
      context: ../../services/user-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/forge
      DB_USERNAME: forge
      DB_PASSWORD: forge_local_dev
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_at_least_32_chars_here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_jwt_refresh_secret_key_at_least_32_chars}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  knowledge-mcp:
    build:
      context: ../../mcp-servers/forge-knowledge-mcp
      dockerfile: Dockerfile
    environment:
      PORT: "8081"
      WIKI_BASE_URL: "http://localhost:8090"
      WIKI_API_TOKEN: ""
    volumes:
      - ../../knowledge-base:/knowledge-base:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  database-mcp:
    build:
      context: ../../mcp-servers/forge-database-mcp
      dockerfile: Dockerfile
    environment:
      PORT: "8082"
      FORGE_DB_FORGE_URL: "jdbc:h2:mem:forge;DB_CLOSE_DELAY=-1"
      FORGE_DB_FORGE_USER: sa
      FORGE_DB_FORGE_PASSWORD: ""
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ../../web-ide/backend
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FORGE_SECURITY_ENABLED: ${FORGE_SECURITY_ENABLED:-false}
      FORGE_CORS_ALLOWED_ORIGINS: "http://localhost:9000"
      FORGE_FRONTEND_URL: "http://localhost:9000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FORGE_PLUGINS_PATH: /plugins
      FORGE_MCP_SERVERS: "http://knowledge-mcp:8081,http://database-mcp:8082"
      OAUTH2_ISSUER_URI: http://keycloak:8080/realms/forge
      OAUTH2_CLIENT_ID: forge-web-ide
    volumes:
      - ../../plugins:/plugins:ro
      - ../../knowledge-base:/knowledge-base:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/knowledge/search"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      keycloak:
        condition: service_healthy
      knowledge-mcp:
        condition: service_healthy
      database-mcp:
        condition: service_healthy

  frontend:
    build:
      context: ../../web-ide/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      BACKEND_WS_URL: ws://backend:8080
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8180
      NEXT_PUBLIC_KEYCLOAK_REALM: forge
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: forge-web-ide
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "9000:9000"
    volumes:
      - ./nginx-trial.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

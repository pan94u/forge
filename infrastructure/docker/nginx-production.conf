# Forge Production Nginx — 单机部署
# 监听 80 和 443 端口，HTTPS 启用
# SSO (Keycloak) 已独立部署到 sso.forge.delivery，本 nginx 不再代理 /auth/

# 限速区域 — 防止滥用
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

# Gzip 压缩
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_vary on;

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name forge.delivery www.forge.delivery;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name forge.delivery www.forge.delivery;

    # SSL 配置
    ssl_certificate /etc/nginx/ssl/forge.delivery_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/forge.delivery.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # 现代 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (可选，启用后浏览器会强制 HTTPS)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # --- 安全头 ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 禁止直接 IP 访问时暴露版本
    server_tokens off;

    # 请求体大小限制
    client_max_body_size 50m;

    # --- Keycloak SSO callback (前端 OIDC 回调页) ---
    location = /auth/callback {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 企业控制台 ---
    # /console 精确匹配：重定向到默认 locale
    location = /console {
        return 302 $scheme://$host/console/zh;
    }
    # /console/* 代理到 Console 应用
    location /console/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # NextAuth session cookie 较大，需增大 buffer
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # --- Enterprise Console API (/console/api/*) ---
    location /console/api/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Enterprise Console Auth (/console/api/auth/*) ---
    location /console/api/auth/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- NextAuth routes (/api/auth/*) - exclude /api/auth/me (backend) ---
    # Auth.js basePath="/api/auth"，但 Console Next.js basePath="/console"，
    # 所以需要重写 /api/auth/* → /console/api/auth/* 再转发给 console。
    location /api/auth/me {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/auth/sso-config {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/auth/ {
        # Rewrite /api/auth/* → /console/api/auth/* for enterprise-console NextAuth
        rewrite ^/api/auth/(.*) /console/api/auth/$1 break;
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Auth.js OIDC 回调 header 较大（含 id_token），需增大 buffer
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # --- REST API (含 SSE 长连接) ---
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- WebSocket ---
    location /ws/ {
        limit_req zone=ws_limit burst=10 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Actuator (限制内网访问) ---
    location /actuator/health {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /actuator/prometheus {
        # 仅允许内网 / 监控系统访问
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # 屏蔽其他 actuator 端点
    location /actuator/ {
        return 403;
    }

    # --- 屏蔽 H2 Console (生产禁止) ---
    location /h2-console/ {
        return 403;
    }

    # --- Web IDE 前端 (catch-all) ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# Synapse AI — synapse.gold
# App 机器独立部署，nginx 全量转发
# ============================================================

# HTTP → HTTPS
server {
    listen 80;
    server_name synapse.gold;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name synapse.gold;

    # SSL 配置（需提前部署 synapse.gold 证书）
    ssl_certificate /etc/nginx/ssl/synapse.gold_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/synapse.gold.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SynSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;
    client_max_body_size 50m;

    # 全量转发到 Synapse App 机器的 Next.js
    # 注意：替换 SYNAPSE_APP_HOST 为实际 App 机器内网 IP 或域名
    location / {
        proxy_pass http://SYNAPSE_APP_HOST:19300;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Auth.js OIDC callback header + session cookie 较大
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;

        # SSE 流式支持（chat 流通过 Next.js API proxy 转发）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

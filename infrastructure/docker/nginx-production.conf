# Forge Production Nginx — 内部反向代理
# 监听 9000，SSL 由外层 gateway-nginx 终止
# forge-gateway 负责 /api/ 和 /ws/ 的 JWT 验签 + X-User-* 注入

# 限速区域 — 防止滥用
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

# Gzip 压缩
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_vary on;

server {
    listen 9000;
    server_name _;

    # --- 安全头 ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
    client_max_body_size 50m;

    # --- 企业控制台 ---
    location = /console {
        return 302 $scheme://$host/console/zh;
    }
    location /console/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # --- Enterprise Console API (/console/api/*) ---
    location /console/api/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Enterprise Console Auth (/console/api/auth/*) ---
    location /console/api/auth/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Login 页面重定向到 Gateway OIDC ---
    # 前端 layout 在未认证时 redirect 到 /login，浏览器请求走 gateway 触发 OIDC 登录
    location = /login {
        rewrite ^ / break;
        proxy_pass http://forge-gateway:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ "^/[a-z]{2}/login$" {
        rewrite ^ / break;
        proxy_pass http://forge-gateway:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- /api/auth/* 全部走 gateway（gateway 注入 X-User-* 或重定向登录）---
    # /api/auth/sso-config 已在 GATEWAY_PUBLIC_ROUTES 中，无需单独处理

    # --- Gateway 端点 (OIDC callback / logout / health) ---
    location /gateway/ {
        proxy_pass http://forge-gateway:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- REST API (经 Gateway 认证 + SSE 长连接) ---
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        # upstream 返回 Content-Encoding: gzip 但 nginx 会解压 body，
        # 必须隐藏原始 Content-Encoding 避免 header/body 不匹配 (ERR_CONTENT_DECODING_FAILED)
        proxy_set_header Accept-Encoding "";
        proxy_hide_header Content-Encoding;

        proxy_pass http://forge-gateway:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- WebSocket ---
    location /ws/ {
        limit_req zone=ws_limit burst=10 nodelay;

        proxy_pass http://forge-gateway:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Actuator ---
    location /actuator/health {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /actuator/prometheus {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /actuator/ {
        return 403;
    }

    # --- 屏蔽 H2 Console ---
    location /h2-console/ {
        return 403;
    }

    # --- Web IDE 前端 (catch-all) ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

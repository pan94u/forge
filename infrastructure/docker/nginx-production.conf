# Forge Production Nginx — 8C16G 单机部署
# 监听 80 和 443 端口，HTTPS 启用

# 限速区域 — 防止滥用
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

# Gzip 压缩
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_vary on;

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name forge.delivery www.forge.delivery;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name forge.delivery www.forge.delivery;

    # SSL 配置
    ssl_certificate /etc/nginx/ssl/forge.delivery_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/forge.delivery.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # 现代 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (可选，启用后浏览器会强制 HTTPS)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # --- 安全头 ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 禁止直接 IP 访问时暴露版本
    server_tokens off;

    # 请求体大小限制
    client_max_body_size 50m;

    # --- Keycloak SSO callback ---
    location = /auth/callback {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Keycloak SSO /auth/* ---
    location /auth/ {
        proxy_pass http://keycloak:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_read_timeout 300s;
    }

    # --- 企业控制台 /console/* ---
    location /console/ {
        proxy_pass http://enterprise-console:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Enterprise Console API (/console/api/*) ---
    location /console/api/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Enterprise Console Auth (/console/api/auth/*) ---
    location /console/api/auth/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- NextAuth routes (/api/auth/*) - exclude /api/auth/me (backend) ---
    location /api/auth/ {
        # Exclude /api/auth/me (backend)
        location /api/auth/me {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Forward other auth routes to enterprise-console
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- REST API (含 SSE 长连接) ---
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- WebSocket ---
    location /ws/ {
        limit_req zone=ws_limit burst=10 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Actuator (限制内网访问) ---
    location /actuator/health {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /actuator/prometheus {
        # 仅允许内网 / 监控系统访问
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # 屏蔽其他 actuator 端点
    location /actuator/ {
        return 403;
    }

    # --- 屏蔽 H2 Console (生产禁止) ---
    location /h2-console/ {
        return 403;
    }

    # --- Web IDE 前端 (catch-all) ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

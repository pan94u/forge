server {
    listen 9000;
    server_name localhost;

    # 使用 $http_host 保留原始端口（19000），避免重定向到内部端口 9000
    absolute_redirect off;

    # --- Keycloak SSO callback (前端 OIDC 回调页) ---
    location = /auth/callback {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- NextAuth routes (/api/auth/*) ---
    # Auth.js generates redirect_uri at /api/auth/callback/keycloak (no /console prefix).
    # Rewrite to /console/api/auth/* so Next.js (basePath=/console) can handle it.
    location /api/auth/ {
        # Backend auth endpoints (不走 NextAuth)
        location /api/auth/me {
            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/auth/sso-config {
            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        rewrite ^/api/auth/(.*)$ /console/api/auth/$1 break;
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Auth.js OIDC 回调 header 较大（含 id_token），需增大 buffer
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # --- REST API ---
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- WebSocket ---
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Actuator ---
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- H2 Console (dev only) ---
    location /h2-console/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Enterprise Console ---
    # /console 精确匹配：重定向到默认 locale
    location = /console {
        return 302 $scheme://$http_host/console/zh;
    }
    # /console/* 代理到 Console 应用
    location /console/ {
        proxy_pass http://enterprise-console:9001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # NextAuth session cookie 较大，需增大 buffer
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # --- Frontend (catch-all) ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

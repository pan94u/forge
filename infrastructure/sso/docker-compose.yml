# =============================================================================
# SSO Infrastructure — Keycloak + PostgreSQL（独立部署）
# =============================================================================
#
# 独立 SSO 服务，供 Forge、Console、Synapse 等应用统一接入。
# 应用只需一个环境变量 SSO_URL 即可完成对接，无需关心 SSO 部署位置。
#
# 本地开发:
#   1. 添加 /etc/hosts: 127.0.0.1 sso.forge.local
#   2. docker compose up -d
#   3. 访问 http://sso.forge.local:8180/auth/admin (admin/admin)
#
# 生产部署 (独立机器 + 域名 sso.forge.delivery):
#   1. 复制 .env.example → .env，修改配置
#   2. 放置 SSL 证书到 SSL_CERT_PATH 目录
#   3. docker compose up -d
#      （生产默认启动 nginx，本地开发用 COMPOSE_PROFILES= 可跳过）
#
# 应用接入（仅需两步）:
#   1. Docker 网络: 加入 sso-net（同机部署）或通过 HTTPS 访问（跨机部署）
#   2. 环境变量: SSO_URL=http://sso.forge.local:8180/auth（开发）
#              SSO_URL=https://sso.forge.delivery/auth（生产）

networks:
  sso-net:
    name: sso-net

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Keycloak 专属数据库
  # ---------------------------------------------------------------------------
  sso-postgres:
    image: postgres:16-alpine
    container_name: forge-sso-postgres
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    networks: [sso-net]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c max_connections=40
    volumes:
      - ${PG_DATA_PATH:-/data/sso-postgres}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Keycloak 24 — SSO 认证中心
  #
  # 统一域名机制:
  #   KC_HOSTNAME_URL 决定 Keycloak 签发的所有 URL（OIDC Discovery、token iss）。
  #   Docker 网络别名（SSO_HOSTNAME）让容器也能解析该域名，
  #   加上 KC_HTTP_PORT = 宿主机映射端口，实现浏览器 + 容器同一 URL。
  #
  # 配置示例:
  #   本地开发（默认）: SSO_HOSTNAME=sso.forge.local, KC_HTTP_PORT=8180
  #   海尔内部: SSO_HOSTNAME=forge-sso.haier.net, KC_HTTP_PORT=9100
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ${KC_COMMAND:-start} --import-realm
    container_name: forge-sso-keycloak
    restart: unless-stopped
    cpus: 1
    mem_limit: 1g
    networks:
      sso-net:
        aliases:
          - ${SSO_HOSTNAME:-sso.forge.local}
    ports:
      - "${KC_PORT:-8180}:${KC_HTTP_PORT:-8180}"
    environment:
      # --- Admin ---
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # --- HTTP ---
      KC_HTTP_PORT: "${KC_HTTP_PORT:-8180}"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: "/auth"
      # --- Hostname ---
      KC_HOSTNAME_URL: "${SSO_URL:-http://sso.forge.local:8180/auth}"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HEALTH_ENABLED: "true"
      # --- Proxy (生产环境通过 .env 设置 KC_PROXY=edge) ---
      KC_PROXY: ${KC_PROXY:-none}
      # --- Database ---
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://sso-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - ${KC_REALM_FILE:-./realm-export.json}:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      sso-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/${KC_HTTP_PORT:-8180} && echo -e 'GET /auth/health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx — SSL 终止 + 反向代理
  #
  # 生产默认启动。本地开发可通过 COMPOSE_PROFILES= 跳过，直接访问 :8180。
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: forge-sso-nginx
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    profiles: ["production"]
    networks: [sso-net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-sso.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-./ssl}:/etc/nginx/ssl:ro
    depends_on:
      keycloak:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

# 数据库数据映射到宿主机 ${PG_DATA_PATH:-/data/sso-postgres}，便于备份和管理

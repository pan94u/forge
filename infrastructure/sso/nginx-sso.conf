# Forge SSO Nginx — sso.forge.delivery
# 仅代理 Keycloak /auth/ 路径，其他路径返回 404

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name sso.forge.delivery;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sso.forge.delivery;

    # SSL
    ssl_certificate /etc/nginx/ssl/sso.forge.delivery_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/sso.forge.delivery.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
    client_max_body_size 10m;

    # --- Keycloak SSO /auth/* ---
    location /auth/ {
        proxy_pass http://keycloak:8180/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_read_timeout 300s;
    }

    # 根路径重定向到 /auth/
    location = / {
        return 301 https://$host/auth/;
    }

    # 其他路径返回 404
    location / {
        return 404;
    }
}

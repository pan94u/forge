# SSO 机器 Nginx — 反向代理 Keycloak
# 监听 80 (HTTP → HTTPS 重定向) + 443 (HTTPS)
# SSL 证书需提前放置到配置的路径

server {
    listen 80;
    server_name sso.forge.delivery;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sso.forge.delivery;

    # SSL 配置（根据实际路径修改）
    ssl_certificate /etc/nginx/ssl/sso.forge.delivery_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/sso.forge.delivery.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    server_tokens off;

    # Keycloak 反向代理
    location / {
        proxy_pass http://sso-keycloak:8180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keycloak OIDC 回调 header 较大，需增大 buffer
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }
}
